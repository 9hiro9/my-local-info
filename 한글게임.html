<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>한글 카드 게임</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #fef3c7;
  }
  h1 { margin-top: 20px; }
  #game {
    display: grid;
    grid-template-columns: repeat(4, 100px);
    gap: 10px;
    justify-content: center;
    margin-top: 30px;
  }
  .card {
    width: 100px;
    height: 100px;
    background: #60a5fa;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
  }
  .flipped {
    background: #34d399;
  }
</style>
</head>
<body>
<h1>🧸 한글 카드 짝맞추기</h1>
<p>같은 글자를 찾아보세요!</p>
<div id="game"></div>

<script>
const words = ['가','나','다','라','마','바','사','아'];
let cards = [...words, ...words];
let first = null;
let lock = false;

cards.sort(() => Math.random() - 0.5);

const game = document.getElementById('game');

cards.forEach(char => {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.value = char;
  div.innerText = '';

  div.onclick = () => {
    if (lock || div.classList.contains('flipped')) return;

    div.innerText = char;
    div.classList.add('flipped');

    if (!first) {
      first = div;
    } else {
      if (first.dataset.value === div.dataset.value) {
        first = null;
      } else {
        lock = true;
        setTimeout(() => {
          div.innerText = '';
          first.innerText = '';
          div.classList.remove('flipped');
          first.classList.remove('flipped');
          first = null;
          lock = false;
        }, 800);
      }
    }
  };

  game.appendChild(div);
});
</script>
</body>
</html>
